databases:
  - name: clean-city-db
    plan: free

services:
  # 1. API Server (Backend)
  - type: web
    name: clean-city-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm -C artifacts/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: clean-city-db
          property: connectionString
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  # 2. Frontend Web App
  - type: static
    name: clean-city-web
    staticPublishDir: artifacts/cleancity/dist
    buildCommand: pnpm install && pnpm -C artifacts/cleancity run build
