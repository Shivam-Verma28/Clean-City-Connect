services:
  # 1. API Server (Backend)
  - type: web
    name: clean-city-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm -C artifacts/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false  # Ab ye aapse manual value maangega dashboard par
      # Add these in Render Dashboard manually
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  # 2. Frontend Web App
  - type: web
    name: clean-city-web
    env: static
    buildCommand: pnpm install && pnpm -C artifacts/cleancity run build
    staticPublishPath: artifacts/cleancity/dist
    envVars:
      - key: VITE_API_URL
        value: https://clean-city-api.onrender.com
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false